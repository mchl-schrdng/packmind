<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PackMind</title>
<link rel="icon" type="image/svg+xml" href="/logo.svg" />
<style>
  :root {
    --bg: #0a0e14; --side: #0d1117; --surface: #131922; --surface2: #1a212c;
    --border: #20262f; --border2: #2a323d;
    --text: #e6edf3; --muted: #8b95a5; --faint: #5b6675;
    --accent: #00e5ff; --accent2: #4dabf5; --good: #3fb950; --warn: #d29922;
    --shadow: 0 1px 2px rgba(0,0,0,.25), 0 6px 18px rgba(0,0,0,.16);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.55 ui-sans-serif, -apple-system, "Segoe UI", Roboto, sans-serif; }
  a { color: inherit; }

  .app { display: grid; grid-template-columns: 248px 1fr; min-height: 100vh; }

  /* Sidebar */
  .side { background: var(--side); border-right: 1px solid var(--border);
    padding: 18px 14px; display: flex; flex-direction: column; gap: 18px; position: sticky; top: 0; height: 100vh; }
  .brand { display: flex; align-items: center; gap: 10px; padding: 2px 6px; }
  .brand .logo { width: 30px; height: 30px; }
  .brand .logo img { width: 100%; height: 100%; display: block; }
  .brand .name { font-size: 16px; font-weight: 650; letter-spacing: .2px; }
  .proj { padding: 0 6px; }
  .proj .pname { color: var(--muted); font-size: 12px; }
  /* Status zone: Healthy + Live share one consistent badge style. */
  .status-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 9px; }
  .pill { display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--good); background: rgba(63,185,80,.12);
    border: 1px solid rgba(63,185,80,.25); padding: 3px 10px; border-radius: 999px; }
  .pill .d { width: 7px; height: 7px; border-radius: 50%; background: var(--good); box-shadow: 0 0 8px var(--good); }
  .pill.live { color: var(--accent); background: rgba(0,229,255,.10); border-color: rgba(0,229,255,.28); }
  .pill.live .d { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .35; } }
  nav { display: flex; flex-direction: column; gap: 2px; }
  .nav-item { display: flex; align-items: center; gap: 11px; padding: 9px 11px;
    border-radius: 9px; color: var(--muted); cursor: pointer; user-select: none;
    border: 1px solid transparent; font-size: 14px; }
  .nav-item svg { width: 17px; height: 17px; flex: none; opacity: .85; }
  .nav-item:hover { color: var(--text); background: var(--surface); }
  .nav-item.active { color: var(--text); background: var(--surface);
    border-color: var(--border2); box-shadow: inset 2px 0 0 var(--accent); }

  /* Main */
  main { min-width: 0; }
  .topbar { display: flex; align-items: center; gap: 12px; padding: 22px 30px 2px; }
  .topbar h1 { font-size: 22px; font-weight: 650; margin: 0; letter-spacing: .2px; }
  .section-desc { color: var(--muted); font-size: 13px; margin: 0; padding: 0 30px 2px; max-width: 1180px; }
  .content { padding: 16px 30px 40px; max-width: 1180px; }

  .hero { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 26px 28px; margin-bottom: 18px; box-shadow: var(--shadow); }
  .hero h2 { margin: 0 0 8px; font-size: 30px; font-weight: 700; }
  .hero p { margin: 0; color: var(--muted); max-width: 760px; }

  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; box-shadow: var(--shadow); }
  .card .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .7px; }
  .card .value { font-size: 30px; font-weight: 700; margin-top: 8px; line-height: 1.1; }
  .card .value.accent { color: var(--accent); }
  .card .value.good { color: var(--good); }
  .card .sub { color: var(--faint); font-size: 12px; margin-top: 4px; }

  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); }
  .panel + .panel, .cards + .panel, .panel + .cards, .section + .section,
  .cards + .grid2, .grid2 + .panel, .panel + .grid2, .grid2 + .cards, .grid2 + .grid2 { margin-top: 18px; }
  .panel .head { padding: 16px 20px; border-bottom: 1px solid var(--border); font-size: 13px;
    text-transform: uppercase; letter-spacing: .6px; color: var(--muted); }
  .panel .body { padding: 18px 20px; }
  .grid2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 18px; }
  .grid2 .panel { margin-top: 0; }

  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 11px 20px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .5px; font-weight: 500; }
  tr:last-child td { border-bottom: none; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.num { color: var(--accent2); }
  code { background: var(--surface2); padding: 1px 7px; border-radius: 6px; font-size: 12.5px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }

  .search { display: flex; gap: 10px; margin-bottom: 16px; }
  .search input { flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 11px 16px; border-radius: 10px; font-size: 14px; outline: none; }
  .search input::placeholder { color: var(--faint); }
  .search input:focus { border-color: var(--accent); }
  .search button { background: var(--accent); color: #00252b; border: none; padding: 0 20px;
    border-radius: 10px; font-weight: 650; cursor: pointer; }

  /* Map toolbar: filter + Tree/Table toggle */
  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; }
  .filter { flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 11px 16px; border-radius: 10px; font-size: 14px; outline: none; }
  .filter::placeholder { color: var(--faint); }
  .filter:focus { border-color: var(--accent); }
  .seg { display: inline-flex; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .seg button { background: none; border: none; color: var(--muted); padding: 9px 16px; cursor: pointer; font-size: 13px; }
  .seg button.active { background: var(--surface2); color: var(--text); }

  /* Project Map tree */
  .tree { padding: 6px 6px 10px; }
  .trow { display: flex; align-items: center; gap: 10px; padding: 5px 10px; border-radius: 7px; font-size: 13px; }
  .trow:hover { background: var(--surface2); }
  .trow.dir { cursor: pointer; user-select: none; }
  .trow .tw { width: 14px; flex: none; text-align: center; color: var(--faint); }
  .trow .nm { font-family: ui-monospace, Menlo, monospace; white-space: nowrap; }
  .trow.dir .nm { font-weight: 600; color: var(--text); }
  .trow .cnt { color: var(--faint); font-size: 11px; flex: none; }
  .trow .desc { color: var(--faint); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
  .trow .bar { width: 64px; height: 6px; background: var(--surface2); border-radius: 4px; overflow: hidden; flex: none; }
  .trow .bar i { display: block; height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); }
  .trow .tok { width: 70px; text-align: right; color: var(--accent2); font-variant-numeric: tabular-nums; font-size: 12px; flex: none; }

  .hit { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
  .hit .h { display: flex; gap: 10px; align-items: center; font-size: 12px; margin-bottom: 8px; }
  .hit .kind { color: var(--accent); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
  .hit .src { color: var(--muted); }
  .hit .score { margin-left: auto; color: var(--accent2); font-variant-numeric: tabular-nums; }
  .hit pre { margin: 0; white-space: pre-wrap; font-size: 12.5px; max-height: 130px; overflow: auto;
    font-family: ui-monospace, Menlo, monospace; color: var(--text); }

  .flags { display: flex; flex-direction: column; gap: 8px; }
  .flag { font-size: 13.5px; padding: 11px 14px; border-radius: 10px; background: var(--surface2); border-left: 3px solid var(--faint); }
  .flag b { display: block; margin-bottom: 2px; }
  .flag.good { border-left-color: var(--good); }
  .flag.warn { border-left-color: var(--warn); }

  pre.raw { margin: 0; padding: 20px; white-space: pre-wrap; font-size: 12.5px; line-height: 1.7;
    font-family: ui-monospace, Menlo, monospace; color: var(--muted); max-height: 70vh; overflow: auto; }

  /* Journal: parsed session cards */
  .jsession .jhead { display: flex; align-items: center; gap: 12px; padding: 14px 20px; flex-wrap: wrap; }
  .jhead .jtime { font-size: 14px; font-weight: 650; color: var(--text); }
  .jhead .jid { font-family: ui-monospace, Menlo, monospace; font-size: 11.5px; color: var(--faint); }
  .jhead .jstats { margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; }
  .jchip { font-size: 11.5px; padding: 3px 10px; border-radius: 999px; background: var(--surface2);
    color: var(--muted); border: 1px solid var(--border); font-variant-numeric: tabular-nums; }
  .jchip.cost { color: var(--accent); background: rgba(0,229,255,.10); border-color: rgba(0,229,255,.28); }
  .jsession table { border-top: 1px solid var(--border); }
  .jsession td.jt { color: var(--faint); font-variant-numeric: tabular-nums; width: 64px; }
  .jsession td.ja { color: var(--accent2); width: 110px; }
  .jempty { padding: 13px 20px; color: var(--faint); font-size: 13px; border-top: 1px solid var(--border); }

  .actrow { display: flex; gap: 14px; align-items: baseline; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13.5px; }
  .actrow:last-child { border-bottom: none; }
  .actrow .t { color: var(--faint); font-variant-numeric: tabular-nums; width: 46px; flex: none; }
  .actrow .a { color: var(--accent2); width: 90px; flex: none; }
  .actrow .f { color: var(--text); }
  .chartbox { padding: 10px 14px 6px; }
  .legend { display: flex; gap: 16px; padding: 0 6px 12px; font-size: 12px; color: var(--muted); }
  .legend i { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 6px; vertical-align: middle; }
  .gaugewrap { display: flex; align-items: center; justify-content: center; padding: 8px; }
  .barsh { display: flex; flex-direction: column; gap: 10px; }
  .barh { display: grid; grid-template-columns: 130px 1fr 90px; align-items: center; gap: 12px; }
  .barh-label { color: var(--muted); font-size: 12.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-family: ui-monospace, Menlo, monospace; }
  .barh-track { height: 12px; background: var(--surface2); border-radius: 6px; overflow: hidden; }
  .barh-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--accent2), var(--accent)); }
  .barh-val { text-align: right; color: var(--accent2); font-size: 12px; font-variant-numeric: tabular-nums; }
  .empty { color: var(--faint); padding: 22px; text-align: center; }
  .muted { color: var(--muted); }
  h3.sub { font-size: 13px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin: 0 0 12px; }

  /* Config tab: forms */
  .frow { display: grid; grid-template-columns: 220px 1fr; align-items: center; gap: 14px; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .frow:last-child { border-bottom: none; }
  .frow label { color: var(--muted); font-size: 13px; }
  .frow .ctl { min-width: 0; }
  .frow input[type=text], .frow input[type=number], .frow select, .cfg textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 9px 12px; border-radius: 9px; font-size: 13.5px; outline: none; font-family: inherit; }
  .frow input:focus, .frow select:focus, .cfg textarea:focus { border-color: var(--accent); }
  .frow input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--accent); }
  .cfg textarea { display: block; min-height: 260px; line-height: 1.6;
    font-family: ui-monospace, Menlo, monospace; white-space: pre; }
  .cfg .actions { display: flex; align-items: center; gap: 14px; padding: 14px 20px; border-top: 1px solid var(--border); }
  .cfg .save { background: var(--accent); color: #00252b; border: none; padding: 9px 20px; border-radius: 9px; font-weight: 650; cursor: pointer; }
  .cfg .status { font-size: 12.5px; }
  .cfg .status.ok { color: var(--good); }
  .cfg .status.err { color: #f47067; }
  .rule { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; padding: 12px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; background: var(--surface2); }
  .rule input, .rule select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 10px; border-radius: 8px; font-size: 13px; outline: none; }
  .rule .full { grid-column: 1 / -1; }
  .rule .meta { display: flex; align-items: center; gap: 12px; }
  .rule .rm { background: none; border: 1px solid var(--border2); color: var(--muted); border-radius: 8px; padding: 6px 12px; cursor: pointer; }
  .addrule { background: var(--surface2); border: 1px dashed var(--border2); color: var(--muted); border-radius: 9px; padding: 9px 14px; cursor: pointer; width: 100%; }
  .badge { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; padding: 2px 7px; border-radius: 999px; background: rgba(0,229,255,.12); color: var(--accent); border: 1px solid rgba(0,229,255,.28); }
  .cmd { font-family: ui-monospace, Menlo, monospace; font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 520px; }

  @media (max-width: 760px) {
    .app { grid-template-columns: 1fr; }
    .side { position: static; height: auto; }
    nav { flex-direction: row; flex-wrap: wrap; }
    .nav-item { flex: 1 1 auto; justify-content: center; }
    .topbar, .section-desc, .content { padding-left: 18px; padding-right: 18px; }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><span class="logo"><img src="/logo-dark.svg" alt="" /></span><span class="name">PackMind</span></div>
    <div class="proj">
      <div class="pname" id="pname">—</div>
      <div class="status-group">
        <span class="pill"><span class="d"></span> Healthy</span>
        <span class="pill live"><span class="d"></span> Live</span>
      </div>
    </div>
    <nav id="nav"></nav>
  </aside>
  <main>
    <div class="topbar">
      <h1 id="title">Overview</h1>
    </div>
    <p class="section-desc" id="desc"></p>
    <div class="content" id="view"><div class="empty">Loading…</div></div>
  </main>
</div>
<script>
const TOKEN = "__TOKEN__";
const api = (p) => fetch(p + (p.includes("?") ? "&" : "?") + "token=" + TOKEN).then(r => r.json());
const $ = (id) => document.getElementById(id);
// Escapes for both text and attribute contexts (quotes included), so a folder
// name containing " or ' can't break out of a title="..." attribute.
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const money = (n) => "$" + (Number(n) || 0).toFixed(4);
const fmtTok = (v) => v >= 1000 ? (v / 1000).toFixed(1) + "k" : String(Math.round(v));

const ICON = {
  overview: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>',
  insights: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l5-5 4 4 8-8"/><path d="M16 4h5v5"/></svg>',
  map: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><path d="M9 4 3 6v14l6-2 6 2 6-2V4l-6 2-6-2z"/><path d="M9 4v14M15 6v14"/></svg>',
  recall: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>',
  solutions: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4.4-3 7.7-7 9-4-1.3-7-4.6-7-9V6l7-3z"/><path d="m9 11 2 2 4-4"/></svg>',
  knowledge: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><path d="M4 5a2 2 0 0 1 2-2h13v16H6a2 2 0 0 0-2 2z"/><path d="M4 19a2 2 0 0 1 2-2h13"/></svg>',
  journal: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M8 6h12M8 12h12M8 18h12"/><circle cx="4" cy="6" r="1"/><circle cx="4" cy="12" r="1"/><circle cx="4" cy="18" r="1"/></svg>',
  config: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
};

// ---- inline-SVG charts (zero dependency) --------------------------------
let _gid = 0;
function areaChart(values, opts) {
  const o = Object.assign({ w: 760, h: 180, pad: 28, fmt: (v) => v, color: "var(--accent)" }, opts || {});
  if (!values.length) return '<div class="empty">No session data yet.</div>';
  const { w, h, pad } = o;
  const max = Math.max(...values, 1e-9);
  const n = values.length;
  const gid = "ag" + (++_gid);
  const x = (i) => pad + (n === 1 ? (w - 2 * pad) / 2 : (i * (w - 2 * pad)) / (n - 1));
  const y = (v) => h - pad - (v / max) * (h - 2 * pad);
  const pts = values.map((v, i) => `${x(i).toFixed(1)},${y(v).toFixed(1)}`);
  const line = "M" + pts.join(" L");
  const area = `M${x(0).toFixed(1)},${(h - pad).toFixed(1)} L` + pts.join(" L") + ` L${x(n - 1).toFixed(1)},${(h - pad).toFixed(1)} Z`;
  const grid = [0, 0.5, 1].map(f => {
    const yy = (h - pad - f * (h - 2 * pad)).toFixed(1);
    return `<line x1="${pad}" y1="${yy}" x2="${w - pad}" y2="${yy}" stroke="var(--border2)" stroke-dasharray="3 4"/>` +
      `<text x="${pad + 2}" y="${(+yy - 5)}" text-anchor="start" fill="var(--faint)" font-size="10">${esc(o.fmt(max * f))}</text>`;
  }).join("");
  const dots = values.map((v, i) => `<circle cx="${x(i).toFixed(1)}" cy="${y(v).toFixed(1)}" r="2.6" fill="${o.color}"><title>${esc(o.fmt(v))}</title></circle>`).join("");
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${o.color}" stop-opacity="0.30"/>
      <stop offset="1" stop-color="${o.color}" stop-opacity="0"/></linearGradient></defs>
    ${grid}<path d="${area}" fill="url(#${gid})"/><path d="${line}" fill="none" stroke="${o.color}" stroke-width="2" stroke-linejoin="round"/>${dots}
  </svg>`;
}

// Vertical stacked bars — rows: [{ label, values: [s0, s1, ...] }] stacked in series order.
function barsV(rows, opts) {
  const o = Object.assign({ w: 760, h: 200, pad: 30, fmt: (v) => v, series: [] }, opts || {});
  if (!rows.length) return '<div class="empty">No session data yet.</div>';
  const { w, h, pad } = o;
  const totals = rows.map(r => r.values.reduce((a, b) => a + b, 0));
  const max = Math.max(...totals, 1e-9);
  const n = rows.length;
  const slot = (w - 2 * pad) / n;
  const bw = Math.min(36, slot * 0.6);
  const yOf = (v) => (v / max) * (h - 2 * pad);
  const grid = [0, 0.5, 1].map(f => {
    const yy = (h - pad - f * (h - 2 * pad)).toFixed(1);
    return `<line x1="${pad}" y1="${yy}" x2="${w - pad}" y2="${yy}" stroke="var(--border2)" stroke-dasharray="3 4"/>` +
      `<text x="${pad + 2}" y="${(+yy - 5)}" text-anchor="start" fill="var(--faint)" font-size="10">${esc(o.fmt(max * f))}</text>`;
  }).join("");
  const labelEvery = Math.ceil(n / 8);
  const bars = rows.map((r, i) => {
    const cx = pad + slot * (i + 0.5);
    let y0 = h - pad;
    let seg = "";
    r.values.forEach((v, k) => {
      const sh = yOf(v);
      if (sh > 0) {
        const col = (o.series[k] && o.series[k].color) || "var(--accent)";
        const nm = (o.series[k] && o.series[k].name) || "";
        seg += `<rect x="${(cx - bw / 2).toFixed(1)}" y="${(y0 - sh).toFixed(1)}" width="${bw.toFixed(1)}" height="${sh.toFixed(1)}" fill="${col}"><title>${esc(nm)}: ${esc(o.fmt(v))}</title></rect>`;
        y0 -= sh;
      }
    });
    const lbl = i % labelEvery === 0 ? `<text x="${cx.toFixed(1)}" y="${h - pad + 14}" text-anchor="middle" fill="var(--faint)" font-size="10">${esc(r.label)}</text>` : "";
    return seg + lbl;
  }).join("");
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block">${grid}${bars}</svg>`;
}

function barsH(rows, opts) {
  const o = Object.assign({ fmt: (v) => v }, opts || {});
  if (!rows.length) return '<div class="empty">No data yet.</div>';
  const max = Math.max(...rows.map(r => r.value), 1e-9);
  return `<div class="barsh">` + rows.map(r => `
    <div class="barh">
      <div class="barh-label" title="${esc(r.label)}">${esc(r.label)}</div>
      <div class="barh-track"><div class="barh-fill" style="width:${Math.max(2, (r.value / max) * 100).toFixed(1)}%${r.color ? ";background:" + r.color : ""}"></div></div>
      <div class="barh-val">${esc(o.fmt(r.value))}</div>
    </div>`).join("") + `</div>`;
}

// Radial gauge for a 0..1 fraction; null renders an em dash.
function gauge(frac, label) {
  const s = 168, cxy = s / 2, r = s / 2 - 16, c = 2 * Math.PI * r;
  if (frac === null || frac === undefined) {
    return `<svg viewBox="0 0 ${s} ${s}" width="${s}" height="${s}">
      <circle cx="${cxy}" cy="${cxy}" r="${r}" fill="none" stroke="var(--surface2)" stroke-width="12"/>
      <text x="${cxy}" y="${cxy + 2}" text-anchor="middle" fill="var(--faint)" font-size="30" font-weight="700">—</text>
      <text x="${cxy}" y="${cxy + 22}" text-anchor="middle" fill="var(--faint)" font-size="11">${esc(label || "")}</text></svg>`;
  }
  frac = Math.max(0, Math.min(1, frac));
  const col = frac >= 0.6 ? "var(--good)" : frac >= 0.3 ? "var(--warn)" : "var(--accent2)";
  const off = c * (1 - frac);
  return `<svg viewBox="0 0 ${s} ${s}" width="${s}" height="${s}">
    <circle cx="${cxy}" cy="${cxy}" r="${r}" fill="none" stroke="var(--surface2)" stroke-width="12"/>
    <circle cx="${cxy}" cy="${cxy}" r="${r}" fill="none" stroke="${col}" stroke-width="12" stroke-linecap="round"
      stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 ${cxy} ${cxy})"/>
    <text x="${cxy}" y="${cxy + 2}" text-anchor="middle" fill="var(--text)" font-size="30" font-weight="700">${Math.round(frac * 100)}%</text>
    <text x="${cxy}" y="${cxy + 22}" text-anchor="middle" fill="var(--faint)" font-size="11">${esc(label || "")}</text></svg>`;
}

// ---- Project Map: tree + table -----------------------------------------
function buildTree(items) {
  const root = { name: "", path: "", dirs: new Map(), files: [], tokens: 0, cost: 0 };
  for (const it of items) {
    const sec = it.section === "./" || !it.section ? "" : it.section;
    const full = sec + it.file;
    const parts = full.split("/").filter(Boolean);
    const fname = parts.pop() ?? it.file;
    let node = root, acc = "";
    for (const p of parts) {
      acc += p + "/";
      if (!node.dirs.has(p)) node.dirs.set(p, { name: p, path: acc, dirs: new Map(), files: [], tokens: 0, cost: 0 });
      node = node.dirs.get(p);
    }
    node.files.push({ name: fname, path: full, tokens: it.tokens || 0, cost: it.cost || 0, description: it.description || "" });
  }
  (function sum(node) {
    let tk = 0, c = 0;
    for (const d of node.dirs.values()) { sum(d); tk += d.tokens; c += d.cost; }
    for (const f of node.files) { tk += f.tokens; c += f.cost; }
    node.tokens = tk; node.cost = c;
  })(root);
  return root;
}
function leafCount(node) {
  let c = node.files.length;
  for (const d of node.dirs.values()) c += leafCount(d);
  return c;
}
function dirHasMatch(node, q) {
  for (const f of node.files) if ((f.path + " " + f.description).toLowerCase().includes(q)) return true;
  for (const d of node.dirs.values()) if (dirHasMatch(d, q)) return true;
  return false;
}

let mapData = [], mapTree = null, mapView = "tree", expanded = new Set();
async function renderMap() {
  mapData = await api("/api/map");
  mapTree = buildTree(mapData);
  // Start with top-level directories expanded.
  expanded = new Set([...mapTree.dirs.values()].map(d => d.path));
  $("view").innerHTML = `
    <div class="toolbar">
      <input id="mq" class="filter" placeholder="Filter files…" />
      <div class="seg" id="mview">
        <button data-v="tree" class="${mapView === "tree" ? "active" : ""}">Tree</button>
        <button data-v="table" class="${mapView === "table" ? "active" : ""}">Table</button>
      </div>
    </div>
    <div class="panel" id="maptbl"></div>`;

  const denom = Math.max(mapTree.tokens, 1);
  const pct = (v) => Math.max(2, (v / denom) * 100).toFixed(1);

  const rowsFor = (node, depth, q) => {
    let out = "";
    const pad = depth * 18 + 8;
    const dirs = [...node.dirs.values()].sort((a, b) => b.tokens - a.tokens);
    for (const d of dirs) {
      if (q && !dirHasMatch(d, q)) continue;
      const open = q ? true : expanded.has(d.path);
      out += `<div class="trow dir" data-path="${esc(d.path)}" style="padding-left:${pad}px">
        <span class="tw">${open ? "▾" : "▸"}</span>
        <span class="nm">${esc(d.name)}/</span>
        <span class="cnt">${leafCount(d)} files</span>
        <span class="desc"></span>
        <span class="bar"><i style="width:${pct(d.tokens)}%"></i></span>
        <span class="tok">${fmtTok(d.tokens)}</span></div>`;
      if (open) out += rowsFor(d, depth + 1, q);
    }
    let files = node.files.slice().sort((a, b) => b.tokens - a.tokens);
    if (q) files = files.filter(f => (f.path + " " + f.description).toLowerCase().includes(q));
    for (const f of files) {
      out += `<div class="trow" style="padding-left:${pad}px">
        <span class="tw"></span>
        <span class="nm" title="${esc(f.path)}">${esc(f.name)}</span>
        <span class="desc">${esc(f.description)}</span>
        <span class="bar"><i style="width:${pct(f.tokens)}%"></i></span>
        <span class="tok">${fmtTok(f.tokens)}</span></div>`;
    }
    return out;
  };

  const draw = () => {
    const q = ($("mq").value || "").toLowerCase();
    if (mapView === "table") {
      const rows = mapData.filter(r => !q || (r.section + r.file).toLowerCase().includes(q)).slice(0, 200);
      $("maptbl").innerHTML = `<div class="head">${mapData.length} files tracked</div>` + (rows.length
        ? `<table><thead><tr><th>File</th><th>Description</th><th class="num">Tokens</th><th class="num">Cost</th></tr></thead><tbody>${
          rows.map(r => `<tr><td><code>${esc(r.section)}${esc(r.file)}</code></td><td class="muted">${esc(r.description)}</td><td class="num">${r.tokens}</td><td class="num">${money(r.cost)}</td></tr>`).join("")
        }</tbody></table>` : '<div class="empty">No match.</div>');
      return;
    }
    const body = rowsFor(mapTree, 0, q);
    $("maptbl").innerHTML = `<div class="head">${mapData.length} files tracked</div><div class="tree">${body || '<div class="empty">No match.</div>'}</div>`;
    // Folder rows toggle only when not filtering (filtering force-opens matches).
    if (!q) document.querySelectorAll(".trow.dir").forEach(el => el.onclick = () => {
      const p = el.dataset.path;
      expanded.has(p) ? expanded.delete(p) : expanded.add(p);
      draw();
    });
  };

  $("mq").addEventListener("input", draw);
  document.querySelectorAll("#mview button").forEach(b => b.onclick = () => {
    mapView = b.dataset.v;
    document.querySelectorAll("#mview button").forEach(x => x.classList.toggle("active", x === b));
    draw();
  });
  draw();
}

// Parse journal.md (## session header, pipe table of actions, > summary lines)
// into structured sessions so the dashboard can render them instead of dumping
// raw markdown.
function parseJournal(text) {
  const sessions = [];
  let cur = null;
  for (const raw of text.split(/\r?\n/)) {
    const line = raw.trimEnd();
    const h = line.match(/^##\s+(\S+)\s+[—-]\s+(.+)$/);
    if (h) { cur = { id: h[1], ts: h[2].trim(), actions: [], summaries: [] }; sessions.push(cur); continue; }
    if (!cur) continue;
    if (line.startsWith("|")) {
      const cells = line.replace(/^\||\|$/g, "").split("|").map(c => c.trim());
      if (cells[0].toLowerCase() === "time") continue;       // header row
      if (/^[-\s]+$/.test(cells.join(""))) continue;         // separator row
      cur.actions.push({ time: cells[0] || "", action: cells[1] || "", file: (cells[2] || "").replace(/`/g, ""), tokens: cells[3] || "" });
      continue;
    }
    const s = line.match(/^>\s*(.+)$/);
    if (s) cur.summaries.push(s[1]);
  }
  return sessions;
}

// Pull the cumulative reads/writes/cost from the last summary line that parses.
function journalStats(sess) {
  let st = { reads: 0, writes: 0, cost: 0, parsed: false, turns: sess.summaries.length };
  for (const s of sess.summaries) {
    const m = s.match(/(\d+)\s+reads?,\s*(\d+)\s+writes?,\s*~?\s*\$?\s*([\d.]+)/i);
    if (m) st = { reads: +m[1], writes: +m[2], cost: +m[3], parsed: true, turns: sess.summaries.length };
  }
  return st;
}

const plural = (n, w) => n + " " + w + (n === 1 ? "" : "s");

async function renderJournal() {
  const j = await api("/api/journal");
  const text = (j.text || "").trim();
  const sessions = parseJournal(text).reverse();   // newest session first
  if (!sessions.length) {
    $("view").innerHTML = `<div class="panel"><div class="empty">${text ? "No session activity recorded yet." : "journal.md is empty."}</div></div>`;
    return;
  }
  $("view").innerHTML = sessions.map(s => {
    const st = journalStats(s);
    const d = new Date(s.ts);
    const when = isNaN(d.getTime()) ? esc(s.ts)
      : d.toLocaleString(undefined, { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
    const chips = st.parsed
      ? `<span class="jchip">${plural(st.reads, "read")}</span><span class="jchip">${plural(st.writes, "write")}</span><span class="jchip cost">${money(st.cost)}</span>`
      : "";
    const body = s.actions.length
      ? `<table><thead><tr><th>Time</th><th>Action</th><th>File</th><th class="num">Tokens</th></tr></thead><tbody>${
          s.actions.map(a => `<tr><td class="jt">${esc(a.time)}</td><td class="ja">${esc(a.action)}</td><td>${a.file ? `<code>${esc(a.file)}</code>` : '<span class="muted">—</span>'}</td><td class="num">${esc(a.tokens)}</td></tr>`).join("")
        }</tbody></table>`
      : `<div class="jempty">No file activity${st.turns ? ` · ${plural(st.turns, "turn")}` : ""}.</div>`;
    return `<div class="panel jsession"><div class="jhead"><span class="jtime">${when}</span><span class="jid">${esc(s.id)}</span><span class="jstats">${chips}</span></div>${body}</div>`;
  }).join("");
}

  method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(body),
}).then(async r => ({ status: r.status, data: await r.json().catch(() => ({})) }));
const getPath = (obj, dotted) => dotted.split(".").reduce((o, k) => (o == null ? undefined : o[k]), obj);
function setStatus(id, status, data) {
  const el = $(id);
  if (status === 200) { el.className = "status ok"; el.textContent = "Saved ✓"; setTimeout(() => { el.textContent = ""; }, 2500); }
  else { el.className = "status err"; el.textContent = (data && data.errors ? data.errors.join("; ") : (data && data.error) || "Save failed"); }
}

async function renderConfig() {
  const [cfg, policy, know, claude] = await Promise.all([
    api("/api/config"), api("/api/policy"), api("/api/knowledge"), api("/api/claude-config"),
  ]);
  const config = cfg.config || {};
  const editable = cfg.editableKeys || {};
  let rules = (policy.rules || []).map(r => ({ ...r }));

  const fieldHtml = (key, type) => {
    const v = getPath(config, key);
    let ctl;
    if (type === "boolean") ctl = `<input type="checkbox" data-k="${esc(key)}" data-t="boolean" ${v ? "checked" : ""} />`;
    else if (type === "number") ctl = `<input type="number" data-k="${esc(key)}" data-t="number" value="${esc(v ?? "")}" />`;
    else if (type === "exact") ctl = `<select data-k="${esc(key)}" data-t="exact">${["auto", "never", "always"].map(o => `<option ${o === v ? "selected" : ""}>${o}</option>`).join("")}</select>`;
    else if (type === "leanMode") ctl = `<select data-k="${esc(key)}" data-t="leanMode">${["off", "lite", "full"].map(o => `<option ${o === v ? "selected" : ""}>${o}</option>`).join("")}</select>`;
    else if (type === "stringArray") ctl = `<input type="text" data-k="${esc(key)}" data-t="stringArray" value="${esc((v || []).join(", "))}" placeholder="comma, separated" />`;
    else ctl = `<input type="text" data-k="${esc(key)}" data-t="string" value="${esc(v ?? "")}" />`;
    return `<div class="frow"><label>${esc(key)}</label><div class="ctl">${ctl}</div></div>`;
  };
  const settingsFields = Object.entries(editable).map(([k, t]) => fieldHtml(k, t)).join("");

  $("view").innerHTML = `
    <div class="panel cfg">
      <div class="head">Settings · config.json</div>
      <div class="body" id="cfgFields">${settingsFields}</div>
      <div class="actions"><button class="save" id="cfgSave">Save settings</button><span class="status" id="cfgStatus"></span></div>
    </div>
    <div class="panel cfg">
      <div class="head">Guardrails · policy.json</div>
      <div class="body"><div id="ruleList"></div><button class="addrule" id="addRule">+ Add rule</button></div>
      <div class="actions"><button class="save" id="polSave">Save guardrails</button><span class="status" id="polStatus"></span></div>
    </div>
    <div class="panel cfg">
      <div class="head">Knowledge · knowledge.md</div>
      <div class="body"><textarea id="kText" spellcheck="false">${esc(know.text || "")}</textarea></div>
      <div class="actions"><button class="save" id="kSave">Save knowledge</button><span class="status" id="kStatus"></span></div>
    </div>
    <div class="panel">
      <div class="head">Claude Code · hooks &amp; MCP (read-only)</div>
      <div class="body">
        ${(claude.hooks && claude.hooks.length) ? `<table><thead><tr><th>Event</th><th>Matcher</th><th>Command</th><th class="num">Timeout</th><th></th></tr></thead><tbody>${
          claude.hooks.map(h => `<tr><td>${esc(h.event)}</td><td><code>${esc(h.matcher || "*")}</code></td><td class="cmd" title="${esc(h.command)}">${esc(h.command)}</td><td class="num">${h.timeout ?? "—"}</td><td>${h.managed ? '<span class="badge">packmind</span>' : ""}</td></tr>`).join("")
        }</tbody></table>` : '<div class="empty">No hooks registered.</div>'}
        <h3 class="sub" style="margin:18px 0 10px">MCP servers</h3>
        ${(claude.mcpServers && claude.mcpServers.length) ? claude.mcpServers.map(m => `<div class="actrow"><span class="a">${esc(m.name)}</span><span class="f"><code>${esc(m.command)} ${esc((m.args || []).join(" "))}</code></span></div>`).join("") : '<div class="empty">No MCP servers registered.</div>'}
        <p class="muted" style="margin-top:14px;font-size:12.5px">Editing hooks here is intentionally disabled — manage them with <code>packmind init</code> or your Claude Code settings.</p>
      </div>
    </div>`;

  $("cfgSave").onclick = async () => {
    const patch = {};
    document.querySelectorAll("#cfgFields [data-k]").forEach(el => {
      const k = el.dataset.k, t = el.dataset.t;
      if (t === "boolean") patch[k] = el.checked;
      else if (t === "number") patch[k] = Number(el.value);
      else if (t === "stringArray") patch[k] = el.value.split(",").map(s => s.trim()).filter(Boolean);
      else patch[k] = el.value;
    });
    const { status, data } = await postJson("/api/config", patch);
    setStatus("cfgStatus", status, data);
  };

  const collectRules = () => Array.from(document.querySelectorAll("#ruleList .rule")).map(el => {
    const g = (s) => el.querySelector(s);
    const rule = { id: g(".r-id").value.trim(), message: g(".r-msg").value.trim(), severity: g(".r-sev").value };
    const glob = g(".r-glob").value.trim(); if (glob) rule.pathGlob = glob;
    const content = g(".r-content").value.trim(); if (content) rule.content = content;
    if (g(".r-secret").checked) rule.secretFile = true;
    return rule;
  });
  const drawRules = () => {
    $("ruleList").innerHTML = rules.map((r, i) => `
      <div class="rule" data-i="${i}">
        <input type="text" class="r-id" placeholder="id" value="${esc(r.id || "")}" />
        <select class="r-sev"><option ${r.severity === "warn" ? "selected" : ""}>warn</option><option ${r.severity === "block" ? "selected" : ""}>block</option></select>
        <button class="rm">Remove</button>
        <input type="text" class="r-msg full" placeholder="message shown to Claude" value="${esc(r.message || "")}" />
        <input type="text" class="r-glob" placeholder="pathGlob (e.g. src/**/*.ts)" value="${esc(r.pathGlob || "")}" />
        <input type="text" class="r-content" placeholder="content regex" value="${esc(r.content || "")}" />
        <label class="meta full"><input type="checkbox" class="r-secret" ${r.secretFile ? "checked" : ""} /> matches secret files</label>
      </div>`).join("") || '<div class="empty">No rules yet. Add one below.</div>';
    document.querySelectorAll("#ruleList .rm").forEach(b => b.onclick = () => {
      rules = collectRules(); rules.splice(+b.closest(".rule").dataset.i, 1); drawRules();
    });
  };
  drawRules();
  $("addRule").onclick = () => { rules = collectRules(); rules.push({ id: "", message: "", severity: "warn" }); drawRules(); };
  $("polSave").onclick = async () => {
    const { status, data } = await postJson("/api/policy", { rules: collectRules() });
    setStatus("polStatus", status, data);
  };

  $("kSave").onclick = async () => {
    const { status, data } = await postJson("/api/knowledge", { text: $("kText").value });
    setStatus("kStatus", status, data);
  };
}

buildNav();
go("overview");
</script>
</body>
</html>
