name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: build & test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      # --no-optional skips the heavy local-embedding deps (sharp/onnxruntime).
      # The test suite uses a stub embedder, so they are not needed in CI.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --no-optional

      - name: Type-check & build
        run: pnpm build

      - name: Test
        run: pnpm test
