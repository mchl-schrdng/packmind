name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: build & test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check & build
        run: pnpm build

      - name: Test
        run: pnpm test

  audit:
    name: dependency CVE audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Gate on the production/shipped dependency tree (high+ fails the build).
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=high
      # Full tree (incl. dev toolchain) is informational only — never blocks.
      - name: Audit full tree (informational)
        run: pnpm audit || true

  coverage:
    name: coverage badge
    # Only refresh the committed badge on pushes to main (not PRs/forks).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run coverage
        run: pnpm test:coverage
      - name: Regenerate badge
        run: pnpm coverage:badge
      - name: Commit badge if changed
        run: |
          if ! git diff --quiet -- badges/coverage.svg; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add badges/coverage.svg
            git commit -m "chore: update coverage badge [skip ci]"
            # `main` is a protected branch, so the bot can't push directly.
            # Best-effort: if the push is rejected, surface a notice instead of
            # failing the run — refresh the badge via a PR when coverage moves.
            git push || echo "::notice::coverage badge changed but not pushed (main is protected — update badges/coverage.svg via a PR)"
          else
            echo "coverage badge unchanged"
          fi
